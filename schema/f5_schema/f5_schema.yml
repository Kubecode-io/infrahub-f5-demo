---
# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
version: "1.0"
nodes:

  - name: LTM
    namespace: Loadbalancer
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    icon: clarity:network-switch-solid
    label: F5 LTM Load Balancer
    include_in_menu: false
    inherit_from:
      - DcimGenericDevice
    relationships:
      - name: hagroup
        peer: LoadbalancerLTMHAGroup
        cardinality: many

  - name: LTMHAGroup
    namespace: Loadbalancer
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    icon: carbon:load-balancer-classic
    label: F5 LTM HA Group
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
    relationships:
      - name: vip
        peer: F5networksVIP
        cardinality: many

  - name: VIP
    namespace: F5networks
    description: A load balancer that distributes network traffic via Virtual IPs (VIPs) to frontend servers.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: "F5 VIP"
    icon: carbon:floating-ip
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
      - name: source_address
        kind: IPNetwork
      - name: destination_address
        kind: IPNetwork
      - name: service_port
        kind: Number
    relationships:
      - name: pool
        peer: F5networksPool
        cardinality: one
        optional: false
      - name: ltm_ha_group
        peer: LoadbalancerLTMHAGroup
        cardinality: one
        kind: Parent
        optional: false

  - name: Pool
    namespace: F5networks
    description: A server pool consisting of backend servers (nodes) that receive traffic from VIPs.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: "F5 Server Pool"
    icon: carbon:load-balancer-pool
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
    relationships:
      - name: member
        peer: F5networksPoolMember
        cardinality: many
      - name: vip
        peer: F5networksVIP
        cardinality: many
      - name: monitor
        peer: F5networksMonitor
        cardinality: many

  - name: PoolMember
    namespace: F5networks
    description: A member of an F5 server pool, representing a backend server (node) and its associated service port.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    icon: mdi:server-plus
    label: F5 Pool Member (Node and Port)
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        computed_attribute:
          kind: Jinja2
          jinja2_template: "{{ node__name__value}}:{{ service_port__value }}"
        read_only: true
        optional: false
        unique: true
      - name: service_port
        kind: Number
        optional: false
    relationships:
      - name: pool
        peer: F5networksPool
        cardinality: many
      - name: node
        peer: F5networksNode
        cardinality: one

  - name: Node
    namespace: F5networks
    description: Backend server (node) that serves as a member of a server pool.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    icon: clarity:rack-server-solid
    label: F5 Node (Backend Server)
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
      - name: ip_address
        kind: IPHost
        optional: true
      - name: fqdn
        kind: Text
        optional: true
    relationships:
      - name: pool_member
        peer: F5networksPoolMember
        cardinality: many

  - name: Monitor
    namespace: F5networks
    description: A health monitor checks the availability and performance of backend servers (nodes) in a server pool.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: F5 Monitor
    icon: mdi:heart-pulse
    include_in_menu: false
    attributes:
      - name: name
        kind: Dropdown
        description: Monitor
        choices:
          - name: http
            label: HTTP
            description: HTTP monitor.
            color: "#A9DFBF"  # light pastel green
          - name: tcp
            label: TCP
            description: TCP monitor.
            color: "#A9CCE3"  # pastel blue
    relationships:
      - name: pool
        peer: F5networksPool
        cardinality: many
---
# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
version: "1.0"
generics:
  - name: BaseObject
    namespace: F5networks
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        order_weight: 100
        computed_attribute:
          kind: Jinja2
          jinja2_template: "/{{ partition__value}}/{{ object_name__value }}"
        read_only: true
        optional: false
      - name: partition
        kind: Text
        order_weight: 200
      - name: object_name
        kind: Text
        order_weight: 300
        unique: true

  - name: Monitor
    namespace: F5networks
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        order_weight: 100
        computed_attribute:
          kind: Jinja2
          jinja2_template: "/{{ partition__value}}/{{ object_name__value }}"
        read_only: true
        optional: false
      - name: partition
        kind: Text
        order_weight: 200
      - name: object_name
        kind: Text
        order_weight: 300
        unique: true
      - name: destination
        kind: Text
        description: The destination IP address and port for this monitor to check.
        default_value: "*:*"
      - name: interval
        kind: Number
        description: The time interval (in seconds) between health checks performed by the monitor.
        default_value: 10
      - name: time_until_up
        kind: Number
        description: The amount of time, in seconds, after the first successful response before a node is marked up.
        default_value: 0
      - name: timeout
        kind: Number
        description: The number of seconds the target has in which to respond to the monitor request.
        default_value: 31
      - name: app_service
        kind: Text
        description: This feature is depricated. You can supply app-service name for compatibility.
        optional: true
    relationships:
      - name: pool
        peer: F5networksPool
        cardinality: many

  - name: IPMonitor
    namespace: F5networks
    include_in_menu: false
    attributes:
      - name: ip_dscp
        kind: Number
        description: Specifies the differentiated services code point (DSCP).
        default_value: 0
      - name: recv
        kind: Text
        description: The text string that the monitor looks for in the returned resource.
      - name: send
        kind: Text
        description: The text string that the monitor sends to the target object.

nodes:
  - name: LTM
    namespace: Loadbalancer
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    icon: clarity:network-switch-solid
    label: F5 LTM Load Balancer
    include_in_menu: false
    inherit_from:
      - DcimGenericDevice
    relationships:
      - name: hagroup
        peer: LoadbalancerLTMHAGroup
        cardinality: one

  - name: LTMHAGroup
    namespace: Loadbalancer
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    icon: carbon:load-balancer-classic
    label: F5 LTM HA Group
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
    relationships:
      - name: vip
        peer: F5networksVIP
        cardinality: many
      - name: ltm
        peer: LoadbalancerLTM
        cardinality: many

  - name: VIP
    namespace: F5networks
    description: A virtual server.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: ltm virtual
    icon: carbon:floating-ip
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: destination_partition
        kind: Text
      - name: destination_address
        kind: IPHost
      - name: destination_service_port
        kind: Number
      - name: source_address
        kind: IPNetwork
      - name: app_service
        kind: Text
        description: This feature is depricated. You can supply app-service name for compatibility.
        optional: true
    relationships:
      - name: pool
        peer: F5networksPool
        cardinality: one
        optional: true
      - name: ltm_ha_group
        peer: LoadbalancerLTMHAGroup
        cardinality: one
        kind: Parent
        optional: false
      - name: virtual_address
        peer: F5networksVirtualAddress
        cardinality: one
      - name: rule
        peer: F5networksRule
        cardinality: many
        optional: true
      - name: snat_pool
        peer: F5networksSNATPool
        cardinality: one
        optional: true

  - name: VirtualAddress
    namespace: F5networks
    description: Destination IP of one or more virtual servers.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: ltm virtual-address
    icon: mdi:ip
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: address
        kind: IPHost
        description: The virtual IP address.
      - name: mask
        kind: Text
        description: Sets the netmask for one or more network virtual servers only.
        default_value: 255.255.255.255
      - name: arp
        kind: Boolean
        description: Enable/Disble ARP
        default_value: true
      - name: icmp_echo
        kind: Dropdown
        # MDI color palette: https://htmlcolorcodes.com/color-chart/material-design-color-chart/
        choices:
          - name: enabled
            label: Enabled
            description: ICMP echo reply will be sent to ICMP echo requests.
            color: "#388E3C"  # green
          - name: always
            label: Always
            description: ICMP echo reply will be sent to ICMP echo requests.
            color: "#388E3C"  # green
          - name: disabled
            label: Disabled
            description: ICMP echo reply will not be sent to ICMP echo requests.
            color: "#D32F2F"  # red
          - name: selective
            label: Selective
            description: ICMP echo reply will sent be to ICMP echo requests, when availability status is true.
            color: "#FFA000"  # amber
          - name: any
            label: Any
            description: ICMP echo reply will be sent to ICMP echo requests, when any of the contributing virtual server is available.
            color: "#1976D2"  # blue
          - name: all
            label: All
            description: ICMP echo reply will be sent to ICMP echo requests, when all of the contributing virtual server is available.
            color: "#1976D2"  # blue
    relationships:
      - name: vip
        peer: F5networksVIP
        cardinality: one
        kind: Parent
        optional: false

  - name: Pool
    namespace: F5networks
    description: A server pool consisting of backend servers (nodes) that receive traffic from VIPs.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: ltm pool
    icon: carbon:load-balancer-pool
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: app_service
        kind: Text
        description: This feature is depricated. You can supply app-service name for compatibility.
        optional: true
    relationships:
      - name: members
        peer: F5networksPoolMember
        cardinality: many
      - name: vips
        peer: F5networksVIP
        cardinality: many
      - name: monitors
        peer: F5networksMonitor
        cardinality: many

  - name: PoolMember
    namespace: F5networks
    description: A member of an F5 server pool, representing a backend server (node) and its associated service port.
    uniqueness_constraints:
      - ["name__value", "pool"]
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    icon: mdi:server-plus
    label: ltm pool { members {}}
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
        computed_attribute:
          kind: Jinja2
          jinja2_template: "{{ node__name__value }}:{{ service_port__value }}"
        read_only: true
        optional: false
      - name: service_port
        kind: Number
        optional: false
      - name: state
        kind: Dropdown
        description: Specifies the current state of the pool member.
        choices:
          - name: user_up
            label: user-up
            color: "#388E3C"  # green
            description: Pool member may handle connections.
          - name: user_down
            label: user-down
            color: "#D32F2F"  # red
            description: Pool member may *NOT* handle new connections.
        default_value: user_up
    relationships:
      - name: pool
        peer: F5networksPool
        cardinality: one
        optional: false
      - name: node
        peer: F5networksNode
        cardinality: one

  - name: Node
    namespace: F5networks
    description: Backend server (node) that serves as a member of a server pool.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    icon: clarity:rack-server-solid
    label: ltm node
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: ip_address
        kind: IPHost
        description: The IP address of the node.
        optional: true
      - name: fqdn_address_family
        kind: Dropdown
        description: Specifies whether the fqdn should consider IPv4, IPv6, or IP-agnostic address family.
        choices:
          - name: all
            label: all
            color: "#388E3C"  # green
            description: IP-agnostic address family.
          - name: ipv4
            label: IPv4
            color: "#AFB42B"  # lime
            description: IPv4 address family.
          - name: ipv6
            label: IPv6
            color: "#F57C00"  # orange
            description: IPv6 address family.
        default_value: all
        optional: true
      - name: fqdn_autopopulate
        kind: Boolean
        optional: true
      - name: fqdn_name
        kind: Text
        description: Specifies the fully-qualified domain name of the node.
        optional: true
      - name: state
        kind: Dropdown
        description: Specifies the current state of the node.
        choices:
          - name: user_up
            label: user-up
            color: "#388E3C"  # green
            description: Node may handle connections.
          - name: user_down
            label: user-down
            color: "#D32F2F"  # red
            description: Node may *NOT* handle new connections.
        default_value: user_up
    relationships:
      - name: pool_member
        peer: F5networksPoolMember
        cardinality: many

  - name: LDAPMonitor
    namespace: F5networks
    description: This type of monitor verifies the LDAP service by attempting to authenticate the specified user.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: ltm monitor ldap
    icon: mdi:heart-pulse
    include_in_menu: false
    inherit_from: [ F5networksMonitor]
    attributes:
      - name: base
        kind: Text
        description: Specifies the location in the LDAP tree from which the monitor starts the health check.
      - name: chase_referrals
        kind: Boolean
        description: Enable/Disable chasing referrals in LDAP monitoring.
        default_value: true
      - name: debug
        kind: Boolean
        description: Enable/Disable debug mode for LDAP monitoring.
        default_value: false
      - name: filter
        kind: Text
        description: The LDAP search filter used to identify the user for authentication.
      - name: mandatory_attributes
        kind: Boolean
        description: Specifies whether the target must include attributes in its response to be considered up.
        default_value: false
      - name: password
        kind: Password
        description: The password if the monitored target requires authentication.
      - name: username
        kind: Text
        description: The username, if the monitored target requires authentication.

  - name: HTTPMonitor
    namespace: F5networks
    description: This type of monitor verifies the HTTP service by attempting to receive specific content from a Web page.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: ltm monitor http
    icon: mdi:heart-pulse
    include_in_menu: false
    inherit_from: [ F5networksMonitor, F5networksIPMonitor]

  - name: HTTPSMonitor
    namespace: F5networks
    description: This type of monitor verifies the HTTPS service by attempting to receive specific content from a Web page.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: ltm monitor https
    icon: mdi:heart-pulse
    include_in_menu: false
    inherit_from: [ F5networksMonitor, F5networksIPMonitor]
    relationships:
      - name: ssl_profile
        peer: F5networksServerSSLProfile
        cardinality: one

  - name: TCPMonitor
    namespace: F5networks
    description: This type of monitor verifies the TCP service by performing a TCP handshake.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: ltm monitor tcp
    icon: mdi:heart-pulse
    include_in_menu: false
    inherit_from: [ F5networksMonitor, F5networksIPMonitor]

  - name: ICMPMonitor
    namespace: F5networks
    description: This type of monitor verifies the node by sending an ICMP Echo.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: ltm monitor icmp
    icon: mdi:heart-pulse
    include_in_menu: false
    inherit_from: [ F5networksMonitor, F5networksIPMonitor]

  - name: ExternalMonitor
    namespace: F5networks
    description: This type of monitor verifies the node by running a script.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: ltm monitor icmp
    icon: mdi:heart-pulse
    include_in_menu: false
    inherit_from: [ F5networksMonitor, F5networksIPMonitor]
    attributes:
      - name: run
        kind: Text
        description: The external monitor file to be executed by the external monitor.

  - name: Rule
    namespace: F5networks
    description: Tcl script that defines custom logic for processing traffic on a VIP.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: F5 Rule
    icon: mdi:script-text
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: script
        kind: TextArea
        description: The content of the rule, written in Tcl.
    relationships:
      - name: vip
        peer: F5networksVIP
        cardinality: many
        optional: true
      - name: pool
        peer: F5networksPool
        cardinality: many

  - name: SNATPool
    namespace: F5networks
    description: A pool of translation addresses used for source NAT (SNAT).
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: F5 SNAT Pool
    icon: ic:baseline-nat
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: address
        kind: IPHost
        description: The virtual IP address.
    relationships:
      - name: vip
        peer: F5networksVIP
        cardinality: many
        optional: true
      - name: snat_translation_address
        peer: F5networksSNATTranslationAddress
        cardinality: one
        optional: false

  - name: SNATTranslationAddress
    namespace: F5networks
    description: Explicitly defines the properties of a SNAT translation address.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: F5 SNAT Translation Address
    icon: iconoir:ip-address-tag
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: address
        kind: IPHost
        description: The translation IP address.
    relationships:
      - name: snat_pool
        peer: F5networksSNATPool
        cardinality: one

  - name: HTTPProfile
    namespace: F5networks
    description: The HTTP profile allows the virtual server to operate in full Layer 7 (L7) inspection mode.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: F5 HTTP Profile
    icon: material-symbols:lab-profile
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: insert_xforwarded_for
        kind: Boolean
        description: Enables or disables insertion of an X-Forwarded-For header.
        optional: true
      - name: rfc_compliance
        kind: Boolean
        description: Enable to enforce RFC compliance.
        optional: true
      - name: unknown_method_allow
        kind: Boolean
        description: Enable to allow all methods.
        optional: true
      - name: known_methods
        kind: List
        description: The HTTP methods known by the HTTP filter.
        default_value: [CONNECT, DELETE, GET, HEAD, LOCK, OPTIONS, POST, PROPFIND, PUT, TRACE, UNLOCK]
      - name: max_header_count
        kind: Number
        description: The maximum number of headers in HTTP request or response that will be handled.
        default_value: 64
      - name: max_header_size
        kind: Number
        description: The maximum header size.
        default_value: 32768
      - name: max_requests
        kind: Number
        description: The number of requests accepted per-connection. Zero means unlimited.
        default_value: 0
      - name: pipeline
        kind: Boolean
        description: Enables or disables HTTP/1.1 pipelining.
        default_value: true
      - name: truncated_redirects
        kind: Boolean
        description: Enable to pass-through a redirect lacking the trailing carriage-return and line.
        default_value: false
      - name: hsts_preload
        kind: Boolean
        description: Specifies if the preload directive is sent in the HSTS header.
        default_value: false
      - name: via_request
        kind: Dropdown
        choices:
          - name: append
            label: append
            color: "#1976D2"  # blue
            description: "The value from via-host-name is appended to the Via: HTTP header."
          - name: preserve
            label: preserve
            color: "#388E3C"  # green
            description: "Via: HTTP header is preserved without changes."
          - name: remove
            label: remove
            color: "#FFA000"  # amber
            description: "Via: HTTP header is removed from the request."
        optional: true
      - name: proxy_type
        kind: Dropdown
        choices:
          - name: reverse
            label: reverse
            color: "#1976D2"  # blue
            description: Manages traffic to backend web servers, acting as a standard reverse proxy.
        default_value: reverse
      - name: header_insert
        kind: Text
        description: Specifies a quoted header string that you want to insert into an HTTP request.
        optional: true
    relationships:
      - name: defaults_from
        peer: F5networksHTTPProfile

  - name: TCPProfile
    namespace: F5networks
    description: Use the TCP profile to manage TCP network traffic.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: F5 TCP Profile
    icon: material-symbols:lab-profile
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: idle_timeout
        kind: Number
        description: Number of seconds that a connection is idle before the connection is eligible for deletion.
        default_value: 300
      - name: init_cwnd
        kind: Number
        description: Initial congestion window size.
        default_value: 10
      - name: init_rwnd
        kind: Number
        description: Initial receive window size.
        default_value: 10
      - name: keep_alive_interval
        kind: Number
        description: keep-alive probe interval, in seconds.
        default_value: 1800
      - name: minimum_rto
        kind: Number
        description: The minimum TCP retransmission timeout in milliseconds.
        default_value: 1000
      - name: proxy_buffer_high
        kind: Number
        description: The highest level at which the receive window is closed.
        default_value: 131072
      - name: proxy_buffer_low
        kind: Number
        description: The lowest level at which the receive window is closed.
        default_value: 98304
      - name: proxy_mss
        kind: Boolean
        description: When enabled, the system advertises the same TCP maximum segment size to the server as was negotiated with the client.
        default_value: false
      - name: proxy_options
        kind: Boolean
        description: When enabled, the system advertises an option only if it was negotiated with the client.
        default_value: false
    relationships:
      - name: defaults_from
        peer: F5networksHTTPProfile

  - name: SSLCertificate
    namespace: F5networks
    description: Specifies the name of the certificate installed on the traffic management system for SSL connections.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: sys file ssl-cert
    icon: fluent:certificate-16-filled
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]

  - name: SSLCertificateChain
    namespace: F5networks
    description: Specifies a certificate chain file that a client can use to authenticate the profile.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: sys file ssl-cert (chain)
    icon: fluent:certificate-16-filled
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]

  - name: SSLKey
    namespace: F5networks
    description: Specifies the name of a key file that you generated and installed on the system.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: sys file ssl-key
    icon: fluent:certificate-16-filled
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]

  - name: CertKeyChain
    namespace: F5networks
    description: A set of certificate, key, passphrase, chain
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: sys file ssl-key
    icon: fluent:certificate-16-filled
    include_in_menu: false
    attributes:
      - name: name
        kind: Text
    relationships:
      - name: cert
        peer: F5networksSSLCertificate
        cardinality: one
      - name: chain
        peer: F5networksSSLCertificateChain
        cardinality: one
      - name: key
        peer: F5networksSSLKey
        cardinality: one

  - name: ClientSSLProfile
    namespace: F5networks
    description: Enables the BIG-IP system to accept and terminate client requests that are sent using a fully SSL-encapsulated protocol.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: F5 ClientSSL Profile
    icon: material-symbols:lab-profile
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: passphrase
        kind: Password
        description: The key passphrase, if required.
      - name: server_name
        kind: Text
        description: Specifies the server names to be matched with SNI extension.
      - name: sni_default
        kind: Boolean
        description: When true, this profile is the default SSL profile.
    relationships:
      - name: cert
        peer: F5networksCertKeyChain
        cardinality: one

  - name: ServerSSLProfile
    namespace: F5networks
    description: Enables the BIG-IP system to initiate secure connections to your SSL servers by using a fully SSL-encapsulated protocol.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: F5 ServerSSL Profile
    icon: material-symbols:lab-profile
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: passphrase
        kind: Password
        description: The key passphrase, if required.
      - name: server_name
        kind: Text
        description: Specifies the server names to be matched with SNI extension.
      - name: sni_default
        kind: Boolean
        description: When true, this profile is the default SSL profile.
    relationships:
      - name: cert
        peer: F5networksSSLCertificate
        cardinality: one
      - name: chain
        peer: F5networksSSLCertificateChain
        cardinality: one
      - name: key
        peer: F5networksSSLKey
        cardinality: one

  - name: OneConnectProfile
    namespace: F5networks
    description: The OneConnect feature minimises the number of server-side TCP connections.
    human_friendly_id: ["name__value"]
    display_label: "{{ name__value }}"
    label: F5 OneConnect Profile
    icon: material-symbols:lab-profile
    include_in_menu: false
    inherit_from: [ F5networksBaseObject]
    attributes:
      - name: source_mask
        kind: Text
        description: A mask of 0.0.0.0 causes the system to share reused connections across all clients.

              - namespace: Loadbalancing
                name: F5TCPMonitor
                label: F5 TCP Monitor
                kind: F5networksTCPMonitor
                icon: mdi:heart-pulse

              - namespace: Loadbalancing
                name: F5ICMPMonitor
                label: F5 ICMP Monitor
                kind: F5networksICMPMonitor
                icon: mdi:heart-pulse

              - namespace: Loadbalancing
                name: F5ExternalMonitor
                label: F5 External Monitor
                kind: F5networksExternalMonitor
                icon: mdi:heart-pulse